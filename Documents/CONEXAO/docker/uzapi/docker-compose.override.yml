version: '3.8'

services:
  wuzapi:
    environment:
      - WUZAPI_ADMIN_TOKEN=${WUZAPI_ADMIN_TOKEN:-admin_token_123}
      - TZ=America/Sao_Paulo
    volumes:
      - wuzapi_data:/app/data
      - wuzapi_sessions:/app/sessions
    command: --logtype=console --color=true --port=8080























