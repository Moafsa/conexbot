# Override para produção: app Next.js + rede Traefik
# Uso: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# Definir CONEXBOT_DOMAIN (ex: conexbot.seudominio.com) e .env com segredos

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: conext-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://admin:${POSTGRES_PASSWORD:-password123}@postgres:5432/conext_db?schema=public
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-with-openssl-rand-base64-32}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://app.conext.click}
      UZAPI_URL: http://uzapi:8080
      UZAPI_SECRET_KEY: ${UZAPI_SECRET_KEY:-admin_token_123}
      WUZAPI_ADMIN_TOKEN: ${UZAPI_SECRET_KEY:-admin_token_123}
      INTERNAL_WEBHOOK_URL: http://app:3000
      NEXT_PUBLIC_APP_URL: ${NEXTAUTH_URL:-https://app.conext.click}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: https://bs3.conext.click
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: media
      # Compat: o app espera S3_* (MinIO via S3 API)
      # Usar a URL pública aqui faz o frontend receber uma URL acessível.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: https://bs3.conext.click
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: media
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.conexbot.rule=Host(`${CONEXBOT_DOMAIN:-conexbot.localhost}`)"
      - "traefik.http.routers.conexbot.entrypoints=web"
      - "traefik.http.routers.conexbot.service=conexbot"
      - "traefik.http.services.conexbot.loadbalancer.server.port=3000"
    command: sh -c "prisma migrate deploy && exec node server.js"

  minio:
    networks:
      - default
      - proxy

  uzapi:
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
